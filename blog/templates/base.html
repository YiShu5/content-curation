<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}降噪{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/daily.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
    {% block extra_styles %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="site-header">
        <div class="header-inner">
            <div class="header-brand">
                <a href="{{ url_for('index') }}" class="logo" aria-label="降噪首页">
                    <svg class="logo-mark" viewBox="0 0 36 36" aria-hidden="true">
                        <circle cx="18" cy="18" r="16" fill="#E9F5FC"/>
                        <path d="M7 11h8M7 16h12M7 21h9M7 26h6" stroke="#2E9FE6" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M20 10l6 8-6 8" fill="none" stroke="#17191C" stroke-width="2.2" stroke-linejoin="round"/>
                        <circle cx="28" cy="18" r="3" fill="#E85C55"/>
                    </svg>
                    <span class="logo-text">降噪</span>
                    <span class="logo-en">NOISE<br>FILTER</span>
                </a>
            </div>
            <nav class="site-nav" aria-label="主导航">
                <a href="{{ url_for('daily_archive') }}">往期简报</a>
                <a href="{{ url_for('library') }}">深度内容库</a>
                <a href="{{ url_for('search') }}">搜索</a>
            </nav>
            {% block header_actions %}{% endblock %}
        </div>
    </header>

    {% block hero %}{% endblock %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>YS AI KOL | AI PM</p>
        </div>
    </footer>
    <script>
    // 卡片全局交互：卡片可点击，背景介绍可独立展开。
    (function () {
        function openCard(card) {
            var href = card && card.dataset ? card.dataset.href : '';
            if (!href) return;
            window.open(href, '_blank', 'noopener');
        }
        document.addEventListener('click', function (e) {
            var expand = e.target.closest && e.target.closest('.card-expand-btn');
            if (expand) {
                e.preventDefault();
                e.stopPropagation();
                var insight = expand.closest('.card-insight');
                if (!insight) return;
                var expanded = insight.classList.toggle('expanded');
                expand.textContent = expanded ? '收起' : '展开';
                expand.setAttribute('aria-expanded', expanded ? 'true' : 'false');
                return;
            }
            var card = e.target.closest && e.target.closest('.card[data-href]');
            if (!card) return;
            if (e.target.closest('a, button, input, select, textarea, summary')) return;
            openCard(card);
        });
        document.addEventListener('keydown', function (e) {
            if (e.key !== 'Enter' && e.key !== ' ') return;
            var card = e.target.closest && e.target.closest('.card[data-href]');
            if (!card || e.target.closest('a, button, input, select, textarea, summary')) return;
            e.preventDefault();
            openCard(card);
        });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
