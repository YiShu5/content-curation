{% extends "base.html" %}

{% block title %}降噪｜{{ issue.issue_date }} 值得知道的讨论{% endblock %}
{% block body_class %}daily-page{% endblock %}
{% block extra_head %}
{% if issue %}
<link rel="canonical" href="{{ canonical_url }}">
<meta name="description" content="{{ issue.topics[0].why_ranked }}">
<meta property="og:type" content="article">
<meta property="og:title" content="降噪｜{{ issue.issue_date }} 值得知道的讨论">
<meta property="og:description" content="{{ issue.topics[0].why_ranked }}">
<meta property="og:url" content="{{ canonical_url }}">
<meta property="og:image" content="{{ og_image_url }}">
{% endif %}
{% endblock %}
{% block content %}{% include "_daily_brief.html" %}{% endblock %}
