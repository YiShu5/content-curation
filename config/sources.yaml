# 订阅源配置
# 把你想追踪的频道/播客填进来，./run.sh auto 会自动处理新内容
#
# YouTube: url 填频道的 /videos 页面地址（@handle 或 /channel/UC... 均可）
# Bilibili: id 填 UP 主的数字 UID（space.bilibili.com/{id} 里的数字）
# 小宇宙: rss_url 在「播客详情页 → 分享 → 复制 RSS」里找

youtube:
  - name: "Y Combinator"
    url: "https://www.youtube.com/@ycombinator/videos"
    limit: 3

